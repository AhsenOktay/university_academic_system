version: '3.9'

services:

  # ─── Veritabanı ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: bas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bas_db
      POSTGRES_USER: bas_user
      POSTGRES_PASSWORD: bas_password
    volumes:
      - bas_postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bas_redis
    restart: unless-stopped
    networks:
      - bas_network

  # ─── Backend (Django) ─────────────────────────────────────────
  backend:
    ports:
      - "8000:8000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bas_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - bas_media:/app/media
      - bas_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bas_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"

  # ─── Celery Worker ────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bas_celery
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - bas_network
    command: celery -A config worker -l info

  # ─── Celery Beat (Zamanlayıcı) ────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bas_celery_beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - bas_network
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Frontend (React) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bas_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bas_network
  # ─── Nginx (Reverse Proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bas_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - bas_static:/staticfiles:ro
      - bas_media:/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - bas_network

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  bas_postgres_data:
  bas_media:
  bas_static:

# ─── Networks ─────────────────────────────────────────────────
networks:
  bas_network:
    driver: bridge
